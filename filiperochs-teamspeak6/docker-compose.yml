version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: filiperochs-teamspeak6_teamspeak_1
      APP_PORT: 10080
      PROXY_AUTH_ADD: "false"

  teamspeak:
    image: teamspeaksystems/teamspeak6-server:latest
    restart: on-failure
    ports:
      - "9987:9987/udp"
      - "30033:30033/tcp"
      - "10080:10080/tcp"
    volumes:
      - ${APP_DATA_DIR}/data:/var/tsserver
    environment:
      - TSSERVER_LICENSE_ACCEPTED=accept
      - TSSERVER_DEFAULT_PORT=9987
      - TSSERVER_VOICE_IP=0.0.0.0
      - TSSERVER_FILE_TRANSFER_PORT=30033
      - TSSERVER_FILE_TRANSFER_IP=0.0.0.0
      - TSSERVER_QUERY_HTTP_ENABLED=true
      - TSSERVER_QUERY_HTTP_PORT=10080
      - TSSERVER_QUERY_ADMIN_PASSWORD=${TS_ADMIN_PASSWORD:-umbrel}
