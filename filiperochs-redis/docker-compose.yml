version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: filiperochs-redis_rediscommander_1
      APP_PORT: 8081

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-umbrel} --appendonly yes
    volumes:
      - ${APP_DATA_DIR}/redis:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-umbrel}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-umbrel}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rediscommander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-umbrel}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-umbrel}
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
