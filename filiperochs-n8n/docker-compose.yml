version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: filiperochs-n8n_n8n_1
      APP_PORT: 5678
      PROXY_AUTH_ADD: "false"

  n8n:
    image: n8nio/n8n:2.11.2@sha256:0d948060adcaf1da4a1410f3e1c071a093f7df1cce59c9d0e5f2f99eda14b322
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/.n8n:/home/node/.n8n
    stop_grace_period: 1m
    environment:
      - PUID=1000
      - PGID=1000
      # Used to set the url for editor, REST API & webhooks
      - N8N_HOST=n8n.filiperocha.dev
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.filiperocha.dev
      - N8N_EDITOR_BASE_URL=https://n8n.filiperocha.dev
      - N8N_PROXY_HOPS=1
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_SECURE_COOKIE=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - EXECUTIONS_TIMEOUT_MAX=7200
      - N8N_RUNNERS_TASK_REQUEST_TIMEOUT=7200
